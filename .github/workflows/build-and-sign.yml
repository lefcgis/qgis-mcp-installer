name: build-and-sign

# Construye el .exe y lo firma con SignPath Foundation (gratis para OSS).
# Se dispara al publicar un tag vX.Y.Z, o manualmente desde la pestaña Actions.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write   # para adjuntar el .exe firmado al Release
  id-token: write   # requerido por la action de SignPath

jobs:
  # ── 1) Construir el .exe (Windows) ──────────────────────────────────────────
  build:
    runs-on: windows-latest
    outputs:
      artifact-id: ${{ steps.up.outputs.artifact-id }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"   # coincide con el Python de QGIS 3.44 LTR

      - name: Instalar dependencias de build
        run: python -m pip install -r requirements-build.txt

      - name: Construir el .exe (sin ofuscar)
        run: python build_exe.py --clean

      - name: SHA-256 del binario SIN firmar (traza)
        run: |
          $h = (Get-FileHash dist/qgis-mcp-installer.exe -Algorithm SHA256).Hash.ToLower()
          Write-Output "unsigned-sha256=$h" >> $env:GITHUB_STEP_SUMMARY
        shell: pwsh

      - id: up
        uses: actions/upload-artifact@v4
        with:
          name: qgis-mcp-installer-unsigned
          path: dist/qgis-mcp-installer.exe
          if-no-files-found: error

  # ── 2) Firmar con SignPath Foundation ───────────────────────────────────────
  sign:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Enviar a firmar (SignPath)
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: qgis-mcp-installer
          signing-policy-slug: release-signing
          github-artifact-id: ${{ needs.build.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed

      - name: SHA-256 del binario FIRMADO (publícalo con la descarga)
        run: |
          sha256sum signed/qgis-mcp-installer.exe | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Adjuntar el .exe firmado al Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: signed/qgis-mcp-installer.exe
          fail_on_unmatched_files: true
